name: Generate PDF Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm1 \
            libnss3 \
            libatk-bridge2.0-0 \
            libxss1 \
            libasound2t64 \
            libx11-xcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            libpango-1.0-0 \
            libcairo2 \
            libcups2 \
            libdrm2 \
            libxrandr2 \
            libxkbcommon0

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Generate PDF Documentation
        run: |
          md-to-pdf README.md --launch-options '{"args": ["--no-sandbox", "--disable-setuid-sandbox", "--disable-gpu"]}'
          mv README.pdf documentation.pdf

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add documentation.pdf
          git commit -m "docs: update documentation.pdf [skip ci]" || echo "No changes to commit"
          git push
