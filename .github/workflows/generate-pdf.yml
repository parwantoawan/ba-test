name: Generate PDF Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate PDF Documentation
        uses: yoshimiru/markdown-to-pdf@v1
        with:
          input_path: README.md
          output_path: documentation.pdf
          build_mermaid: true # Explicitly enable mermaid

      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add documentation.pdf
          git commit -m "docs: update documentation.pdf [skip ci]" || echo "No changes to commit"
          git push
