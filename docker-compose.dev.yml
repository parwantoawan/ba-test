version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: karyawan_web_dev
    ports:
      - "8080:80"
    volumes:
      - ./application:/var/www/html/application
      - ./assets:/var/www/html/assets
      - ./index.php:/var/www/html/index.php
      - ./.htaccess:/var/www/html/.htaccess
      - ./database:/var/www/html/database
    depends_on:
      database:
        condition: service_healthy
    networks:
      - karyawan_network
    restart: unless-stopped

  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: karyawan_db_dev
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "StrongPassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data_dev:/var/opt/mssql
    networks:
      - karyawan_network
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "StrongPassword123!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  karyawan_network:
    driver: bridge

volumes:
  mssql_data_dev:
    driver: local
